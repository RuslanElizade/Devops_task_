<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecure Password Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🔐 CyberSecure Password Checker</h1>
        <p>Check how strong your password is</p>

        <form method="POST">
            <input type="text" name="password" placeholder="Enter your password..." required>
            <button type="submit">Check Password</button>
        </form>

        {% if result %}
        <div class="result">
            <h2>Score: {{ result.score }}/100</h2>
            <h3 class="strength">Strength: {{ result.strength }}</h3>

            <ul>
                {% for f in result.feedback %}
                <li>🔹 {{ f }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
